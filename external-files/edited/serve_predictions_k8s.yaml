apiVersion: v1
kind: ConfigMap
metadata:
  name: predictions-server-config
  namespace: default
data:
  nginx.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;
        
        # Enable directory listing
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        
        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
        
        location / {
            try_files $uri $uri/ =404;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: predictions-server
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: predictions-server
  template:
    metadata:
      labels:
        app: predictions-server
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: predictions
          mountPath: /usr/share/nginx/html
          readOnly: true
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx.conf
      volumes:
      - name: predictions
        hostPath:
          path: /home/ai1/DATA/LSTM/predictions
          type: Directory
      - name: nginx-config
        configMap:
          name: predictions-server-config
---
apiVersion: v1
kind: Service
metadata:
  name: predictions-server
  namespace: default
spec:
  type: NodePort  # Change to LoadBalancer if you have cloud LB
  selector:
    app: predictions-server
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080  # Access via <NODE_IP>:30080
---
